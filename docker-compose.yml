version: '3.8'

services:
  # ==================== FastAPI 应用 ====================
  blog-backend:
    image: blog-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog_backend
    restart: always
    user: "root"
    ports:
      - "20030:8000"
    volumes:
      - /opt/blog:/app
    working_dir: /app
    command: >
      bash -c "alembic upgrade head || exit 1 &&
      python -m src.db.init_data || exit 1 &&
      gunicorn src.main:app
      --workers ${WORKERS:-4}
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --access-logfile -
      --error-logfile -"
    depends_on:
      - blog-postgresql
      - blog-redis
      - blog-minio
    networks:
      - blog-network

  # ==================== PostgreSQL ====================
  blog-postgresql:
    image: postgres:16.7-alpine
    container_name: blog_postgres
    restart: always
    ports:
      - "20031:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - TZ=Asia/Shanghai
    volumes:
      - /opt/blog-data/postgresql:/var/lib/postgresql/data
    networks:
      - blog-network

  # ==================== Redis ====================
  blog-redis:
    image: redis:7-alpine
    container_name: blog_redis
    restart: always
    user: "root"
    ports:
      - "20032:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - /opt/blog-data/redis:/data
    networks:
      - blog-network

  # ==================== MinIO ====================
  blog-minio:
    image: minio/minio:latest
    container_name: blog_minio
    restart: always
    user: "root"
    ports:
      - "20033:9000"
      - "20034:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - /opt/blog-data/minio/data:/data
      - /opt/blog-data/minio/config:/root/.minio
    command: server /data --console-address ":9001"
    networks:
      - blog-network

  # ==================== Celery Worker ====================
  blog-celery-worker:
    image: blog-backend:latest
    container_name: blog_celery-worker
    restart: always
    user: "root"
    volumes:
      - /opt/blog:/app
    working_dir: /app
    command: >
      bash -c "mkdir -p logs &&
      celery -A src.core.celery_app.celery_app worker
      -l info
      -P prefork
      --concurrency=1
      -Q celery,email
      --logfile=logs/celery.log"
    depends_on:
      - blog-postgresql
      - blog-redis
      - blog-minio
    networks:
      - blog-network

  # ==================== Tomcat ====================
  blog-tomcat:
    image: tomcat:latest
    container_name: blog_tomcat
    restart: always
    user: "root"
    expose:
      - "8080"
    ports:
      - "10026:8080"
    volumes:
      - /opt/front:/usr/local/tomcat/webapps
    networks:
      - blog-network


# ==================== 网络配置 ====================
networks:
  blog-network:
    driver: bridge
